<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard de Impressoras - Monitoramento Premium</title>
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/x-icon">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <div class="container-fluid dashboard-bg">
        <header class="d-flex justify-content-between align-items-center py-4 px-3 mb-4">
            <h1 class="h3 mb-0">Monitoramento</h1>
            <div class="header-info d-flex align-items-center">
                <span id="current-datetime" class="d-none d-md-block"></span>
                <button id="refresh-data" class="btn btn-sm rounded-circle" aria-label="Atualizar Dados">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button id="theme-toggle" class="btn btn-sm rounded-pill" aria-label="Alternar tema">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <main class="flex-fill px-3">
            <section class="row mb-5">
                <div class="col-lg col-md-4 col-sm-6 mb-4">
                    <div class="card summary-card">
                        <h5 class="card-title">Total</h5>
                        <p class="h2" id="total-impressoras">0</p>
                    </div>
                </div>
                <div class="col-lg col-md-4 col-sm-6 mb-4">
                    <div class="card summary-card">
                        <h5 class="card-title">Online</h5>
                        <p class="h2 online-color" id="online-impressoras">0</p>
                    </div>
                </div>
                <div class="col-lg col-md-4 col-sm-6 mb-4">
                    <div class="card summary-card">
                        <h5 class="card-title">Offline</h5>
                        <p class="h2 offline-color" id="offline-impressoras">0</p>
                    </div>
                </div>
                <div class="col-lg col-md-6 col-sm-6 mb-4">
                    <div class="card summary-card">
                        <h5 class="card-title">Toner Baixo</h5>
                        <p class="h2 low-toner-color" id="low-toner-impressoras">0</p>
                    </div>
                </div>
                <div class="col-lg col-md-6 col-sm-6 mb-4">
                    <div class="card summary-card">
                        <h5 class="card-title">Com Erro</h5>
                        <p class="h2 error-color" id="error-impressoras">0</p>
                    </div>
                </div>
            </section>

            <nav aria-label="Navegação por Empreendimento">
                <ul class="nav nav-pills dashboard-tabs justify-content-center mb-4" id="empreendimentoTabs" role="tablist"></ul>
            </nav>

            <div class="tab-content" id="empreendimentoTabContent"></div>
            
            <div id="loading-spinner" class="text-center mt-5" style="display: none;">
                <div class="spinner-border" role="status"></div>
                <p class="mt-2">Carregando dados...</p>
            </div>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
