<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status das Impressoras</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="dashboard-bg">
    <div class="container-fluid py-4">
            <button id="theme-toggle" class="btn btn-secondary btn-sm">
                <i class="fas fa-moon"></i> Modo Escuro
            </button>
        </h1>

        <div class="row mb-4 text-center">
            <div class="col-md-4">
                <div class="card summary-card">
                    <div class="card-body">
                        <h5 class="card-title">Total de Impressoras</h5>
                        <h3 class="text-primary" id="total-impressoras">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card summary-card">
                    <div class="card-body">
                        <h5 class="card-title">Impressoras Online</h5>
                        <h3 class="text-success" id="online-impressoras">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card summary-card">
                    <div class="card-body">
                        <h5 class="card-title">Impressoras Offline</h5>
                        <h3 class="text-danger" id="offline-impressoras">0</h3>
                    </div>
                </div>
            </div>
        </div>

        <ul class="nav nav-tabs dashboard-tabs" id="localTabs" role="tablist">
            <li class="nav-item">
                <a class="nav-link active" id="lagoa-thermas-tab" data-toggle="tab" href="#lagoa-thermas" role="tab" aria-controls="lagoa-thermas" aria-selected="true" data-empreendimento="Lagoa Thermas Clube">Lagoa Thermas Clube</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="ecotowers-tab" data-toggle="tab" href="#ecotowers" role="tab" aria-controls="ecotowers" aria-selected="false" data-empreendimento="Ecotowers">Ecotowers</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="lagoa-jardins-tab" data-toggle="tab" href="#lagoa-jardins" role="tab" aria-controls="lagoa-jardins" aria-selected="false" data-empreendimento="Lagoa Jardins">Lagoa Jardins</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="sala-de-vendas-tab" data-toggle="tab" href="#sala-de-vendas" role="tab" aria-controls="sala-de-vendas" aria-selected="false" data-empreendimento="Sala de Vendas">Sala de Vendas</a>
            </li>
        </ul>

        <div class="tab-content mt-3" id="localTabsContent">
            <div class="tab-pane fade show active" id="lagoa-thermas" role="tabpanel" aria-labelledby="lagoa-thermas-tab">
                <div id="impressoras-lagoa-thermas" class="row mt-3">
                    </div>
            </div>
            <div class="tab-pane fade" id="ecotowers" role="tabpanel" aria-labelledby="ecotowers-tab">
                <div id="impressoras-ecotowers" class="row mt-3">
                    </div>
            </div>
            <div class="tab-pane fade" id="lagoa-jardins" role="tabpanel" aria-labelledby="lagoa-jardins-tab">
                <div id="impressoras-lagoa-jardins" class="row mt-3">
                    </div>
            </div>
            <div class="tab-pane fade" id="sala-de-vendas" role="tabpanel" aria-labelledby="sala-de-vendas-tab">
                <div id="impressoras-sala-de-vendas" class="row mt-3">
                    </div>
            </div>
        </div>

        </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
