<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Impressoras - Caldas Novas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script> 
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</head>
<body>
    <div class="container-fluid py-4 dashboard-bg">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-center flex-grow-1">Dashboard de Monitoramento de Impressoras</h1>
            <button id="theme-toggle" class="btn btn-secondary">
                <i class="fas fa-moon"></i> Modo Escuro 
            </button>
        </div>

        <div class="row mb-4 justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="card shadow-sm summary-card">
                    <div class="card-body text-center">
                        <h4 class="card-title mb-3">Status Geral das Impressoras</h4>
                        <div class="row align-items-center">
                            <div class="col-4">
                                <p class="mb-0">Total:</p>
                                <h3 class="text-primary" id="total-impressoras">0</h3>
                            </div>
                            <div class="col-4">
                                <p class="mb-0">Online:</p>
                                <h3 class="text-success" id="online-impressoras">0</h3>
                            </div>
                            <div class="col-4">
                                <p class="mb-0">Offline:</p>
                                <h3 class="text-danger" id="offline-impressoras">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mb-4">
            <div class="col-lg-10">
                <ul class="nav nav-tabs nav-justified dashboard-tabs">
                    <li class="nav-item">
                        <a class="nav-link active" data-empreendimento="Lagoa Thermas Clube" href="#">Lagoa Thermas Clube</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-empreendimento="Ecotowers" href="#">Ecotowers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-empreendimento="Lagoa Jardins" href="#">Lagoa Jardins</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-empreendimento="Centro de Negócios" href="#">Centro de Negócios</a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div id="loading-spinner" class="text-center my-5" style="display: none;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Carregando...</span>
                    </div>
                    <p class="mt-2">Carregando dados das impressoras...</p>
                </div>

                <div class="row g-4" id="impressoras">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
